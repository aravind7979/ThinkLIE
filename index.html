<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ThinkLIE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        #landing-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10;
            transition: opacity 0.8s ease, visibility 0.8s;
            opacity: 0;
            animation: fadeInLanding 1s forwards;
        }

        @keyframes fadeInLanding {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #landing-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .get-started-btn {
            padding: 16px 32px;
            font-size: 20px;
            font-weight: 600;
            color: #667eea;
            background: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .get-started-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 40px rgba(0,0,0,0.3);
        }

        .signup-container {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: none;
        }

        .signup-container.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .signup-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            position: relative;
            background: white;
            padding: 0 16px;
            font-size: 14px;
            color: #6b7280;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message, .success-message {
            background: #fee;
            color: #c00;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #060;
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <button class="get-started-btn" onclick="startSignup()">Get started with ThinkLIE</button>
    </div>

    <div class="signup-container" id="signupBox">
        <div class="logo">
            <img src="myLogo.png" alt="ThinkLIE Logo" style="width: 60px; height: 60px; margin-bottom: 16px; object-fit: contain;">
            <h1>Create your account</h1>
            <p>Start chatting with ThinkLIE</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="signupForm" onsubmit="signup(event)">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required minlength="6">
            </div>

            <button type="submit" class="signup-btn" id="signupBtn">Sign Up</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="login-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

<script>
    function startSignup() {
        document.getElementById('landing-screen').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('signupBox').classList.add('visible');
        }, 300);
    }

    function showError(message) {
        const errorDiv = document.getElementById("errorMessage");
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
        document.getElementById("successMessage").style.display = "none";
    }

    function showSuccess(message) {
        const successDiv = document.getElementById("successMessage");
        successDiv.textContent = message;
        successDiv.style.display = "block";
        document.getElementById("errorMessage").style.display = "none";
    }

    async function signup(event) {
        event.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("signupBtn");
        
        btn.disabled = true;
        btn.textContent = "Processing...";
        
        try {
            const res = await fetch("http://ec2-16-171-37-1.eu-north-1.compute.amazonaws.com:8000/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.detail || "Failed to create account");
            } else {
                showSuccess("Account created successfully! Redirecting to login...");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        } catch (e) {
            showError("Network error. Make sure the backend is running.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Sign Up";
        }
    }
</script>
</body>
</html>
