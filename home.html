<script>

const API_URL = "http://ec2-16-171-37-1.eu-north-1.compute.amazonaws.com:8000/api";

let currentChatId = null;
let chats = [];

/* ================= AUTH ================= */

function logout() {
    localStorage.removeItem("access_token");
    localStorage.removeItem("user_email");
    window.location.href = "login.html";
}

async function getAccessToken() {
    return localStorage.getItem("access_token");
}

/* ================= INITIAL LOAD ================= */

window.addEventListener("load", async () => {

    const token = await getAccessToken();

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const email = localStorage.getItem("user_email") || "User";

    document.getElementById("userName").textContent = email;
    document.getElementById("userAvatar").textContent =
        email[0].toUpperCase();

    await loadChats();
});


/* ================= CHAT LIST ================= */

async function loadChats() {

    const token = await getAccessToken();

    if (!token) {
        console.log("No token found");
        return logout();
    }

    const res = await fetch(`${API_URL}/chats`, {
        method: "GET",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
        }
    });

    if (!res.ok) {

        console.error("API ERROR:", res.status);

        const txt = await res.text();
        console.error(txt);

        return;
    }

    const data = await res.json();

    chats = data.chats || [];

    renderChatList();

    if (chats.length > 0) {
        selectChat(chats[0].id);
    } else {
        await createNewChat();
    }
}


function renderChatList() {

    const sidebar = document.getElementById("chatList");
    sidebar.innerHTML = "";

    chats.forEach(chat => {

        const btn = document.createElement("div");

        btn.className = "chat-item";
        btn.textContent = chat.title || "Untitled Chat";

        btn.onclick = () => selectChat(chat.id);

        if (chat.id === currentChatId)
            btn.classList.add("active");

        sidebar.appendChild(btn);
    });
}


/* ================= SELECT CHAT ================= */

async function selectChat(chatId) {

    currentChatId = chatId;

    renderChatList();

    await loadMessages(chatId);
}


async function loadMessages(chatId) {

    const token = await getAccessToken();
    if (!token) return logout();

    const res = await fetch(`${API_URL}/chats/${chatId}/messages`, {
        headers: {
            "Authorization": `Bearer ${token}`
        }
    });

    if (!res.ok) {
        console.error("Failed loading messages");
        return;
    }

    const data = await res.json();

    const chatMessages =
        document.getElementById("chatMessages");

    chatMessages.classList.remove("empty");
    chatMessages.innerHTML = "";

    data.forEach(msg => {
        addMessageToUI(msg.role, msg.content);
    });
}


/* ================= SEND MESSAGE ================= */

async function sendMessage() {
    const input = document.getElementById("messageInput");
    let message = input.value.trim();

    if (!message && !attachedImageBase64) return;
    if (!currentChatId) return alert("Create or select a chat first.");

    // Provide a simple generic display text if only an image was submitted
    const displayMsg = message || "Attached an image.";
    addMessageToUI("user", displayMsg);
    
    input.value = "";
    
    // Build payload
    const payload = { message: message };
    if (attachedImageBase64) {
        payload.image = attachedImageBase64;
    }

    // Reset attachments
    attachedImageBase64 = null;
    const preview = document.getElementById("attachmentPreview");
    if (preview) preview.style.display = "none";
    const fileInput = document.getElementById("chatAttachmentInput");
    if (fileInput) fileInput.value = "";
    
    updateSendButton();

    const token = await getAccessToken();
    if (!token) return logout();

    const loadingId = "msg-" + Date.now();
    addMessageToUI("assistant", "Think-LIE is thinking...", false, loadingId);

    try {
        const res = await fetch(`${API_URL}/chats/${currentChatId}/message`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });

        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        if (!res.ok) {
            console.error("Message send failed");
            addMessageToUI("assistant", "Sorry, an error occurred.");
            return;
        }

        const data = await res.json();
        
        if (data.chat_title) {
            const chatObj = chats.find(c => c.id === currentChatId);
            if (chatObj && chatObj.title !== data.chat_title) {
                chatObj.title = data.chat_title;
                renderChatList();
            }
        }
        
        addMessageToUI("assistant", data.reply, true);
    } catch (e) {
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();
        console.error(e);
        addMessageToUI("assistant", "Sorry, an error occurred.");
    }
}


/* ================= CREATE NEW CHAT ================= */

async function createNewChat() {

    const token = await getAccessToken();

    if (!token) return logout();

    const res = await fetch(`${API_URL}/chats`, {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
        }
    });

    if (!res.ok) {
        console.error("Create chat failed");
        return;
    }

    const data = await res.json();

    chats.unshift(data.chat);

    renderChatList();

    selectChat(data.chat.id);
}


/* ================= UI ================= */

marked.setOptions({
  highlight: function(code, lang) {
    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
    return hljs.highlight(code, { language }).value;
  },
  langPrefix: 'hljs language-'
});

function addMessageToUI(role, content, isNew = false, id = null) {
    const chatMessages = document.getElementById("chatMessages");

    if (chatMessages.classList.contains("empty")) {
        chatMessages.classList.remove("empty");
        chatMessages.innerHTML = "";
    }

    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${role}`;
    if (id) messageDiv.id = id;

    const avatarHtml = role === "user" 
        ? (localStorage.getItem("user_email") || "U")[0].toUpperCase() 
        : "<img src='myLogo.png' class='ai-avatar-img'>";

    let contentHtml = "";
    if (role === "assistant") {
        contentHtml = DOMPurify.sanitize(marked.parse(content));
    } else {
        contentHtml = `<p>${escapeHtml(content)}</p>`;
    }

    messageDiv.innerHTML = `
        <div class="message-avatar">${avatarHtml}</div>
        <div class="message-content"></div>
    `;

    const contentDiv = messageDiv.querySelector('.message-content');
    chatMessages.appendChild(messageDiv);

    if (isNew && role === "assistant") {
        contentDiv.innerHTML = "";
        let i = 0;
        const speed = 8;
        function typeWriter() {
            if (i < content.length) {
                i += speed;
                const currentText = content.substring(0, i);
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(currentText));
                chatMessages.scrollTop = chatMessages.scrollHeight;
                requestAnimationFrame(typeWriter);
            } else {
                contentDiv.innerHTML = contentHtml;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
        requestAnimationFrame(typeWriter);
    } else {
        contentDiv.innerHTML = contentHtml;
    }

    chatMessages.scrollTop = chatMessages.scrollHeight;
}


function escapeHtml(text) {

    const div = document.createElement("div");

    div.textContent = text;

    return div.innerHTML;
}


/* ================= INPUT ================= */

function autoResize(textarea) {

    textarea.style.height = "auto";

    textarea.style.height =
        textarea.scrollHeight + "px";
}

let attachedImageBase64 = null;

function updateSendButton() {
    const input = document.getElementById("messageInput");
    const button = document.getElementById("sendButton");

    if (input.value.trim().length > 0 || attachedImageBase64) {
        button.disabled = false;
        button.classList.add("active");
    } else {
        button.disabled = true;
        button.classList.remove("active");
    }
}


/* ================= EVENTS ================= */

document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".logout-btn").addEventListener("click", logout);
    document.getElementById("sendButton").addEventListener("click", sendMessage);
    document.querySelector(".new-chat-btn").addEventListener("click", createNewChat);

    const textarea = document.getElementById("messageInput");
    textarea.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    textarea.addEventListener("input", () => {
        autoResize(textarea);
        updateSendButton();
    });

    const searchInput = document.getElementById("searchChatInput");
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll("#chatList .chat-item");
            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(query)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        });
    }

    const chatAttachmentInput = document.getElementById("chatAttachmentInput");
    const attachmentPreview = document.getElementById("attachmentPreview");
    const attachmentImg = document.getElementById("attachmentImg");
    const removeAttachmentBtn = document.getElementById("removeAttachmentBtn");

    if (chatAttachmentInput) {
        chatAttachmentInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                attachedImageBase64 = evt.target.result;
                attachmentImg.src = attachedImageBase64;
                attachmentPreview.style.display = "block";
                updateSendButton();
            };
            reader.readAsDataURL(file);
        });
    }

    if (removeAttachmentBtn) {
        removeAttachmentBtn.addEventListener("click", () => {
            attachedImageBase64 = null;
            chatAttachmentInput.value = "";
            attachmentPreview.style.display = "none";
            updateSendButton();
        });
    }

    const attachBtn = document.getElementById("attachBtn");
    if (attachBtn) {
        attachBtn.addEventListener("click", () => {
            if (chatAttachmentInput) chatAttachmentInput.click();
        });
    }

    const shareBtn = document.getElementById("shareChatBtn");
    const toastContainer = document.getElementById("toastContainer");
    const toastMessage = document.getElementById("toastMessage");
    const toastCopyBtn = document.getElementById("toastCopyBtn");
    const toastCloseBtn = document.getElementById("toastCloseBtn");
    let toastTimeout;

    if (shareBtn) {
        shareBtn.addEventListener("click", () => {
            if (!currentChatId) {
                alert("Please select a chat to share.");
                return;
            }
            const link = window.location.origin + "/?chat=" + currentChatId;
            toastMessage.textContent = link;
            toastContainer.style.display = "flex";
            
            toastCopyBtn.onclick = () => {
                const tempInput = document.createElement("input");
                tempInput.value = link;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                toastCopyBtn.textContent = "Copied!";
                setTimeout(() => { toastCopyBtn.textContent = "Copy"; }, 2000);
            };

            toastCloseBtn.onclick = () => {
                toastContainer.style.display = "none";
            };

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastContainer.style.display = "none";
            }, 8000);
        });
    }

    const voiceBtn = document.getElementById("voiceBtn");
    let recognition = null;
    let isDictating = false;

    if (voiceBtn) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.continuous = true; // Stay on until manually stopped

            recognition.onresult = (event) => {
                const speechResult = event.results[event.results.length - 1][0].transcript;
                const input = document.getElementById("messageInput");
                input.value += (input.value && !input.value.endsWith(' ') ? " " : "") + speechResult;
                autoResize(input);
                updateSendButton();
            };

            recognition.onend = () => {
                if (isDictating) {
                    // if it ended automatically but we want it continuous, we could restart it
                    // but usually continuous = true keeps it open. 
                    try { recognition.start(); } catch(e) {}
                } else {
                    voiceBtn.style.color = "#6b7280";
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                if (event.error === 'not-allowed') {
                    isDictating = false;
                    voiceBtn.style.color = "#6b7280";
                }
            };
        }

        voiceBtn.addEventListener("click", () => {
            if (!recognition) {
                alert("Speech recognition is not supported in this browser.");
                return;
            }
            
            if (isDictating) {
                // Turn off
                isDictating = false;
                voiceBtn.style.color = "#6b7280";
                recognition.stop();
            } else {
                // Turn on
                isDictating = true;
                voiceBtn.style.color = "#10a37f";
                try {
                    recognition.start();
                } catch(e) {
                    // Already started
                }
            }
        });
    }

    document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "k") {
            e.preventDefault();
            if (searchInput) searchInput.focus();
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === "o") {
            e.preventDefault();
            createNewChat();
        }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === "s") {
            e.preventDefault();
            const sidebar = document.querySelector(".sidebar");
            if (sidebar) sidebar.style.display = sidebar.style.display === "none" ? "flex" : "none";
        }
        if (e.shiftKey && e.key === "Escape") {
            e.preventDefault();
            const input = document.getElementById("messageInput");
            if (input) input.focus();
        }
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "u") {
            e.preventDefault();
            const fileInput = document.getElementById("chatAttachmentInput");
            if (fileInput) fileInput.click();
        }
    });
});

</script>
